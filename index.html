<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planbag KV Variation — 키비주얼 베리에이션 툴</title>
<script src="https://cdn.jsdelivr.net/npm/fabric@5.5.2/dist/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
<style>
:root{
  --ink:#15171c;
  --ink-soft:#3a3f4b;
  --paper:#f6f5f2;
  --paper-line:#e4e1d8;
  --panel:#1b1d23;
  --panel-soft:#262932;
  --panel-line:#34384244;
  --accent:#ff5a36;
  --accent-soft:#ff5a361a;
  --good:#2db87d;
  --muted:#8d92a0;
  --radius:10px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard', -apple-system, sans-serif;
  background:var(--paper);
  color:var(--ink);
  height:100vh;
  overflow:hidden;
}

#app{
  display:grid;
  grid-template-columns: 300px 1fr 280px;
  grid-template-rows: 56px 1fr;
  height:100vh;
}

/* ===== Top bar ===== */
#topbar{
  grid-column: 1 / 4;
  background:var(--panel);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid var(--panel-line);
}
#topbar .brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  font-size:15px;
  letter-spacing:-0.01em;
}
#topbar .brand .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  flex-shrink:0;
}
#topbar .brand .sub{
  color:var(--muted);
  font-weight:500;
  font-size:12px;
  margin-left:6px;
}
#topbar .actions{display:flex; gap:8px; align-items:center;}

/* ===== Buttons ===== */
.btn{
  font-family:inherit;
  border:none;
  border-radius:8px;
  padding:8px 14px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:transform .08s ease, opacity .15s ease;
  display:inline-flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-accent{background:var(--accent); color:#fff;}
.btn-accent:hover{opacity:.9;}
.btn-dark{background:var(--panel-soft); color:#fff; border:1px solid var(--panel-line);}
.btn-dark:hover{background:#2f323c;}
.btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--paper-line);}
.btn-ghost:hover{background:#fff;}
.btn-sm{padding:5px 10px; font-size:12px;}
.btn-block{width:100%; justify-content:center;}
.btn:disabled{opacity:.35; cursor:not-allowed;}

/* ===== Left panel ===== */
#left-panel{
  background:var(--panel);
  color:#fff;
  overflow-y:auto;
  padding:18px 16px 40px;
  border-right:1px solid var(--panel-line);
}
.section-title{
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  color:var(--muted);
  text-transform:uppercase;
  margin:22px 0 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.section-title:first-child{margin-top:0;}

.dropzone{
  border:1.5px dashed #44495433;
  border:1.5px dashed #565b68;
  border-radius:var(--radius);
  padding:18px 12px;
  text-align:center;
  cursor:pointer;
  transition:.15s;
  background:var(--panel-soft);
}
.dropzone:hover, .dropzone.drag{
  border-color:var(--accent);
  background:#2a2230;
}
.dropzone .ico{font-size:22px; margin-bottom:6px; opacity:.8;}
.dropzone .txt{font-size:12.5px; color:var(--muted); line-height:1.5;}
.dropzone input{display:none;}

.kv-thumb-row{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}
.kv-thumb{
  width:54px;height:54px;
  border-radius:6px;
  overflow:hidden;
  border:1.5px solid var(--panel-line);
  cursor:pointer;
  position:relative;
  background:#000;
}
.kv-thumb img{width:100%;height:100%;object-fit:cover;}
.kv-thumb.active{border-color:var(--accent);}
.kv-thumb .del{
  position:absolute; top:1px; right:1px;
  width:16px;height:16px;border-radius:50%;
  background:#000a; color:#fff; font-size:10px;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
}

.preset-list{display:flex; flex-direction:column; gap:6px;}
.preset-item{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--panel-soft);
  border:1px solid var(--panel-line);
  border-radius:8px;
  padding:9px 10px 9px 12px;
  cursor:pointer;
  transition:.12s;
}
.preset-item:hover{background:#2f323c;}
.preset-item.active{
  background:var(--accent-soft);
  border-color:var(--accent);
}
.preset-item .meta{display:flex; flex-direction:column; gap:1px;}
.preset-item .name{font-size:13px; font-weight:600;}
.preset-item .dim{font-size:11px; color:var(--muted);}
.preset-item input[type=checkbox]{
  width:16px;height:16px;
  accent-color:var(--accent);
  margin-right:8px;
  flex-shrink:0;
}
.preset-item .row{display:flex; align-items:center; flex:1;}
.preset-item .del-preset{
  color:var(--muted); font-size:13px; cursor:pointer; padding:2px 4px;
}
.preset-item .del-preset:hover{color:#ff8a6b;}

.add-preset-form{
  margin-top:8px;
  background:var(--panel-soft);
  border:1px solid var(--panel-line);
  border-radius:8px;
  padding:10px;
  display:none;
  flex-direction:column;
  gap:7px;
}
.add-preset-form.show{display:flex;}
.field-row{display:flex; gap:6px;}
.field-row input, .field-row select{flex:1; min-width:0;}
input[type=text], input[type=number], select, textarea{
  background:#12131700;
  background:var(--panel);
  border:1px solid var(--panel-line);
  color:#fff;
  border-radius:6px;
  padding:7px 9px;
  font-size:12.5px;
  font-family:inherit;
  outline:none;
}
input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus{
  border-color:var(--accent);
}
.add-preset-form label{font-size:11px; color:var(--muted); margin-bottom:2px; display:block;}

.font-list{display:flex; flex-direction:column; gap:6px; margin-top:8px;}
.font-item{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--panel-soft);
  border:1px solid var(--panel-line);
  border-radius:8px;
  padding:7px 10px;
  font-size:12.5px;
}
.font-item .del-preset{color:var(--muted); cursor:pointer;}
.font-item .del-preset:hover{color:#ff8a6b;}

/* ===== Center canvas area ===== */
#center{
  background:#dedad0;
  overflow:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px;
  position:relative;
}
#canvas-tabs{
  display:flex;
  gap:6px;
  margin-bottom:18px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:100%;
}
.canvas-tab{
  background:#fff;
  border:1px solid var(--paper-line);
  border-radius:20px;
  padding:7px 16px;
  font-size:12.5px;
  font-weight:600;
  cursor:pointer;
  color:var(--ink-soft);
  transition:.12s;
}
.canvas-tab.active{
  background:var(--ink);
  color:#fff;
  border-color:var(--ink);
}
.canvas-stage-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
.canvas-shadow{
  box-shadow: 0 10px 40px -10px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.12);
  background:#fff;
  position:relative;
}
.canvas-label{
  font-size:12px;
  color:var(--ink-soft);
  font-weight:600;
  background:#fff;
  padding:5px 12px;
  border-radius:6px;
  border:1px solid var(--paper-line);
}
.empty-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:#9a9588;
  text-align:center;
  gap:10px;
}
.empty-state .big{font-size:40px;}
.empty-state .t1{font-size:15px; font-weight:600; color:var(--ink-soft);}
.empty-state .t2{font-size:13px;}

/* ===== Right panel ===== */
#right-panel{
  background:#fff;
  border-left:1px solid var(--paper-line);
  overflow-y:auto;
  padding:18px 16px 40px;
}
#right-panel .section-title{color:#9a9588;}
.layer-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 9px;
  border-radius:7px;
  background:#f6f5f2;
  margin-bottom:6px;
  font-size:12.5px;
  cursor:pointer;
  border:1px solid transparent;
}
.layer-row.active{border-color:var(--accent); background:var(--accent-soft);}
.layer-row .icn{width:14px; text-align:center; opacity:.7;}
.layer-row .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.layer-row .del{color:#b5b0a3; padding:2px;}
.layer-row .del:hover{color:#d44;}

.field-group{margin-bottom:12px;}
.field-group label{
  font-size:11px; font-weight:700; color:#9a9588;
  text-transform:uppercase; letter-spacing:.04em;
  display:block; margin-bottom:5px;
}
.field-group input[type=text], .field-group textarea{
  width:100%;
  background:var(--paper);
  border:1px solid var(--paper-line);
  color:var(--ink);
  border-radius:7px;
  padding:8px 10px;
  font-size:13px;
  font-family:inherit;
}
.field-group textarea{resize:vertical; min-height:50px;}
.field-row-2{display:flex; gap:8px;}
.field-row-2 > div{flex:1;}
.color-swatch-row{display:flex; gap:6px; align-items:center;}
.color-swatch-row input[type=color]{
  width:34px; height:30px; border:1px solid var(--paper-line); border-radius:6px; padding:2px; cursor:pointer;
}
.mini-btn-row{display:flex; gap:6px; margin-top:6px;}
.align-row{display:flex; gap:4px;}
.align-row button{
  flex:1;
  background:var(--paper);
  border:1px solid var(--paper-line);
  border-radius:6px;
  padding:6px;
  cursor:pointer;
  font-size:12px;
}
.align-row button.active{background:var(--ink); color:#fff;}

select{
  background:var(--paper);
  border:1px solid var(--paper-line);
  color:var(--ink);
  border-radius:7px;
  padding:7px 9px;
  font-size:13px;
  font-family:inherit;
  width:100%;
}

.fit-row{display:flex; gap:6px;}
.fit-row button{
  flex:1;
  font-size:12px;
  padding:7px 6px;
  border-radius:7px;
  border:1px solid var(--paper-line);
  background:var(--paper);
  cursor:pointer;
}
.fit-row button.active{background:var(--ink); color:#fff;}

.hint{font-size:11.5px; color:#a39e92; line-height:1.5; margin-top:4px;}

.divider{height:1px; background:var(--paper-line); margin:16px 0;}
#left-panel .divider{background:var(--panel-line);}

.font-upload-row{
  display:flex; gap:6px; margin-top:8px;
}
.font-upload-row input[type=text]{flex:1;}

/* scrollbar */
#left-panel::-webkit-scrollbar, #right-panel::-webkit-scrollbar, #center::-webkit-scrollbar{width:8px; height:8px;}
#left-panel::-webkit-scrollbar-thumb{background:#3a3f4b; border-radius:4px;}
#right-panel::-webkit-scrollbar-thumb, #center::-webkit-scrollbar-thumb{background:#cfcabf; border-radius:4px;}

.toast{
  position:fixed;
  bottom:24px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--ink);
  color:#fff;
  padding:11px 18px;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:999;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:none; align-items:center; justify-content:center; z-index:1000;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:#fff; border-radius:12px; padding:22px;
  width:360px; max-width:90vw;
}
.modal-box h3{margin:0 0 14px; font-size:15px;}
.modal-box .field-group{margin-bottom:10px;}
.modal-actions{display:flex; gap:8px; margin-top:16px; justify-content:flex-end;}

.export-progress{
  font-size:12px; color:var(--muted); margin-top:8px;
}

@media (max-width: 980px){
  #app{grid-template-columns: 1fr;}
  #left-panel, #right-panel{display:none;}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand"><span class="dot"></span>Planbag KV Variation<span class="sub">키비주얼 베리에이션 툴</span></div>
    <div class="actions">
      <button class="btn btn-dark btn-sm" id="btn-reset">전체 초기화</button>
      <button class="btn btn-accent" id="btn-export-all">선택 매체 전체 다운로드</button>
    </div>
  </div>

  <div id="left-panel"><!-- 좌측 패널: 업로드 + 프리셋 + 폰트 (JS로 채워짐) --></div>

  <div id="center">
    <div id="canvas-tabs"></div>
    <div class="canvas-stage-wrap" id="stage-wrap"></div>
  </div>

  <div id="right-panel"><!-- 우측 패널: 레이어 + 속성 (JS로 채워짐) --></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
/* =========================================================
   Planbag KV Variation Tool
   - 키비주얼(PNG/JPG) 업로드 → 매체별(X배너/포스터/현수막 등) 캔버스에
     자동 배치 + 텍스트/로고 반자동 배치 → PNG 다운로드(ZIP)
   ========================================================= */

const MM_TO_PX = 3.7795275591; // 96dpi 기준 1mm = 3.78px (화면 표시용 스케일 기준값)
const EXPORT_DPI = 150; // 다운로드 시 해상도 기준 (큰 사이즈라 300은 브라우저가 버거움 → 150 권장, UI에서 변경 가능)

// ---- 기본 프리셋 (mm 단위) ----
let presets = [
  { id:'p_xbanner', name:'X배너', w:600, h:1800, layout:'bottom-bar', builtin:true },
  { id:'p_poster',  name:'포스터 (A1)', w:594, h:841, layout:'bottom-bar', builtin:true },
  { id:'p_banner',  name:'현수막 (가로)', w:3000, h:800, layout:'side-bar', builtin:true },
];
let selectedPresetIds = new Set(presets.map(p=>p.id)); // 체크된(작업할) 프리셋들

// ---- 업로드된 키비주얼들 ----
let kvImages = []; // {id, dataUrl, name}
let activeKvId = null;

// ---- 업로드된 로고 ----
let logoImages = []; // {id, dataUrl, name}

// ---- 업로드된 커스텀 폰트 ----
let customFonts = []; // {id, family, name}

// ---- 행사 텍스트 (전체 매체 동기화 기준값) ----
let eventText = {
  title: '',
  date: '',
  place: '',
  sub: ''
};

// ---- 캔버스 인스턴스들 : presetId -> {fabricCanvas, scale, kvObj, logoObj, textObjs:{}} ----
let canvases = {};
let activePresetId = null;

let exportDpi = EXPORT_DPI;

// ================= 유틸 =================
function toast(msg, ms=2200){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), ms);
}

function uid(prefix='id'){
  return prefix + '_' + Math.random().toString(36).slice(2,9);
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// mm(실제 인쇄 사이즈) → 화면에 보일 캔버스 px 사이즈로 변환 (긴 변 기준 적당히 축소)
function getDisplayDims(preset){
  const maxScreenDim = 640; // 화면에 보일 최대 길이(px)
  const longSide = Math.max(preset.w, preset.h);
  const scale = Math.min(1, maxScreenDim / (longSide * 1)); // mm 자체를 px처럼 다루고 비율만 축소
  // 비율 유지한 화면용 px (실제 인쇄 px 아님 - fabric 표시 전용)
  let dispW = preset.w * scale;
  let dispH = preset.h * scale;
  // 너무 작아지는 경우 보정
  const minScreenDim = 160;
  if (Math.max(dispW, dispH) < minScreenDim){
    const upscale = minScreenDim / Math.max(dispW, dispH);
    dispW *= upscale; dispH *= upscale;
  }
  return { w: Math.round(dispW), h: Math.round(dispH) };
}

// mm → 실제 export px (해상도 기준)
function getExportDims(preset){
  const pxPerMm = exportDpi / 25.4;
  return {
    w: Math.round(preset.w * pxPerMm),
    h: Math.round(preset.h * pxPerMm)
  };
}

// ================= 좌측 패널 렌더 =================
function renderLeftPanel(){
  const el = document.getElementById('left-panel');
  el.innerHTML = `
    <div class="section-title">키비주얼 업로드</div>
    <div class="dropzone" id="dz-kv">
      <div class="ico">🖼️</div>
      <div class="txt">PNG / JPG 파일을 끌어다 놓거나<br>클릭해서 업로드</div>
      <input type="file" id="input-kv" accept="image/png,image/jpeg" multiple>
    </div>
    <div class="kv-thumb-row" id="kv-thumb-row"></div>

    <div class="divider"></div>

    <div class="section-title">매체 프리셋 <span style="font-weight:500; font-size:11px; color:var(--muted); text-transform:none;">체크 = 작업대상</span></div>
    <div class="preset-list" id="preset-list"></div>
    <button class="btn btn-dark btn-sm btn-block" id="btn-add-preset" style="margin-top:8px;">+ 프리셋 추가</button>
    <div class="add-preset-form" id="add-preset-form">
      <div>
        <label>프리셋 이름</label>
        <input type="text" id="np-name" placeholder="예: 웹배너, 명패, SNS카드">
      </div>
      <div class="field-row">
        <div>
          <label>가로</label>
          <input type="number" id="np-w" placeholder="mm" min="1">
        </div>
        <div>
          <label>세로</label>
          <input type="number" id="np-h" placeholder="mm" min="1">
        </div>
      </div>
      <div>
        <label>레이아웃 기본 스타일</label>
        <select id="np-layout">
          <option value="bottom-bar">하단 정보 바 (세로형 추천)</option>
          <option value="side-bar">측면 정보 바 (가로형 추천)</option>
          <option value="top-title">상단 타이틀</option>
          <option value="none">텍스트 없음 (이미지만)</option>
        </select>
      </div>
      <div class="mini-btn-row">
        <button class="btn btn-accent btn-sm" id="btn-save-preset" style="flex:1;">추가</button>
        <button class="btn btn-ghost btn-sm" id="btn-cancel-preset" style="flex:1; color:#fff; border-color:var(--panel-line);">취소</button>
      </div>
    </div>
    <div class="hint">※ 추가한 프리셋은 브라우저를 새로고침하면 사라집니다. 자주 쓰는 사이즈는 우측 상단 "내보내기" 후 별도로 기록해두세요.</div>

    <div class="divider"></div>

    <div class="section-title">로고 (선택)</div>
    <div class="dropzone" id="dz-logo" style="padding:12px;">
      <div class="ico" style="font-size:18px;">🏷️</div>
      <div class="txt">로고 이미지 업로드 (PNG 권장)</div>
      <input type="file" id="input-logo" accept="image/png,image/jpeg" multiple>
    </div>
    <div class="kv-thumb-row" id="logo-thumb-row"></div>

    <div class="divider"></div>

    <div class="section-title">폰트</div>
    <div class="font-list" id="font-list"></div>
    <div class="font-upload-row">
      <input type="file" id="input-font" accept=".ttf,.otf,.woff,.woff2" style="display:none;">
      <button class="btn btn-dark btn-sm btn-block" id="btn-add-font">+ 폰트 파일 업로드</button>
    </div>
    <div class="hint">기본 폰트: Pretendard (무료 한글 웹폰트). 컴퓨터에 설치된 폰트 파일(.ttf/.otf)을 업로드해서 추가할 수 있습니다.</div>
  `;

  renderKvThumbs();
  renderPresetList();
  renderLogoThumbs();
  renderFontList();
  bindLeftPanelEvents();
}

function renderKvThumbs(){
  const row = document.getElementById('kv-thumb-row');
  row.innerHTML = kvImages.map(kv => `
    <div class="kv-thumb ${kv.id===activeKvId?'active':''}" data-id="${kv.id}">
      <img src="${kv.dataUrl}">
      <div class="del" data-del-kv="${kv.id}">✕</div>
    </div>
  `).join('');
  row.querySelectorAll('.kv-thumb').forEach(t=>{
    t.addEventListener('click', (e)=>{
      if (e.target.dataset.delKv) return;
      activeKvId = t.dataset.id;
      applyActiveKvToAllCanvases();
      renderKvThumbs();
    });
  });
  row.querySelectorAll('[data-del-kv]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = b.dataset.delKv;
      kvImages = kvImages.filter(k=>k.id!==id);
      if (activeKvId === id) activeKvId = kvImages[0]?.id || null;
      applyActiveKvToAllCanvases();
      renderKvThumbs();
    });
  });
}

function renderLogoThumbs(){
  const row = document.getElementById('logo-thumb-row');
  row.innerHTML = logoImages.map(lg => `
    <div class="kv-thumb" data-id="${lg.id}" draggable="true" title="캔버스로 드래그하거나 클릭해서 현재 매체에 추가">
      <img src="${lg.dataUrl}">
      <div class="del" data-del-logo="${lg.id}">✕</div>
    </div>
  `).join('');
  row.querySelectorAll('.kv-thumb').forEach(t=>{
    t.addEventListener('click', (e)=>{
      if (e.target.dataset.delLogo) return;
      addLogoToActiveCanvas(t.dataset.id);
    });
  });
  row.querySelectorAll('[data-del-logo]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      logoImages = logoImages.filter(l=>l.id!==b.dataset.delLogo);
      renderLogoThumbs();
    });
  });
}

function renderFontList(){
  const el = document.getElementById('font-list');
  const builtin = `<div class="font-item"><span>Pretendard (기본)</span><span style="color:var(--muted); font-size:11px;">내장</span></div>`;
  const custom = customFonts.map(f => `
    <div class="font-item">
      <span style="font-family:'${f.family}';">${f.name}</span>
      <span class="del-preset" data-del-font="${f.id}">✕</span>
    </div>
  `).join('');
  el.innerHTML = builtin + custom;
  el.querySelectorAll('[data-del-font]').forEach(b=>{
    b.addEventListener('click', ()=>{
      customFonts = customFonts.filter(f=>f.id!==b.dataset.delFont);
      renderFontList();
      renderFontSelectOptions();
    });
  });
}

function renderPresetList(){
  const el = document.getElementById('preset-list');
  el.innerHTML = presets.map(p => `
    <div class="preset-item ${p.id===activePresetId?'active':''}" data-id="${p.id}">
      <div class="row">
        <input type="checkbox" data-check="${p.id}" ${selectedPresetIds.has(p.id)?'checked':''}>
        <div class="meta">
          <div class="name">${p.name}</div>
          <div class="dim">${p.w} × ${p.h} mm</div>
        </div>
      </div>
      ${p.builtin ? '' : `<span class="del-preset" data-del-preset="${p.id}">✕</span>`}
    </div>
  `).join('');

  el.querySelectorAll('.preset-item').forEach(item=>{
    item.addEventListener('click', (e)=>{
      if (e.target.matches('[data-check]') || e.target.matches('[data-del-preset]')) return;
      switchActivePreset(item.dataset.id);
    });
  });
  el.querySelectorAll('[data-check]').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const id = cb.dataset.check;
      if (cb.checked){
        selectedPresetIds.add(id);
      } else {
        selectedPresetIds.delete(id);
        // 체크 해제 시 fabric 인스턴스를 완전히 정리해서, 다시 체크했을 때
        // 깨끗한 상태로 재생성되도록 한다 (메모리 누수 및 좀비 인스턴스 방지)
        if (canvases[id]){
          canvases[id].fc.dispose();
          delete canvases[id];
        }
      }
      renderCanvasTabs();
    });
  });
  el.querySelectorAll('[data-del-preset]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = b.dataset.delPreset;
      presets = presets.filter(p=>p.id!==id);
      selectedPresetIds.delete(id);
      delete canvases[id];
      if (activePresetId === id) activePresetId = presets[0]?.id || null;
      renderPresetList();
      renderCanvasTabs();
      renderAllCanvasStages();
    });
  });
}

function bindLeftPanelEvents(){
  // KV upload
  const dzKv = document.getElementById('dz-kv');
  const inputKv = document.getElementById('input-kv');
  dzKv.addEventListener('click', ()=>inputKv.click());
  inputKv.addEventListener('change', (e)=>handleKvFiles(e.target.files));
  setupDragDrop(dzKv, handleKvFiles);

  // Logo upload
  const dzLogo = document.getElementById('dz-logo');
  const inputLogo = document.getElementById('input-logo');
  dzLogo.addEventListener('click', ()=>inputLogo.click());
  inputLogo.addEventListener('change', (e)=>handleLogoFiles(e.target.files));
  setupDragDrop(dzLogo, handleLogoFiles);

  // Font upload
  document.getElementById('btn-add-font').addEventListener('click', ()=>document.getElementById('input-font').click());
  document.getElementById('input-font').addEventListener('change', (e)=>handleFontFile(e.target.files[0]));

  // Add preset form
  document.getElementById('btn-add-preset').addEventListener('click', ()=>{
    document.getElementById('add-preset-form').classList.add('show');
  });
  document.getElementById('btn-cancel-preset').addEventListener('click', ()=>{
    document.getElementById('add-preset-form').classList.remove('show');
  });
  document.getElementById('btn-save-preset').addEventListener('click', saveNewPreset);
}

function setupDragDrop(el, handler){
  el.addEventListener('dragover', (e)=>{e.preventDefault(); el.classList.add('drag');});
  el.addEventListener('dragleave', ()=>el.classList.remove('drag'));
  el.addEventListener('drop', (e)=>{
    e.preventDefault();
    el.classList.remove('drag');
    handler(e.dataTransfer.files);
  });
}

async function handleKvFiles(files){
  if (!files || !files.length) return;
  for (const file of files){
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await readFileAsDataURL(file);
    const kv = { id: uid('kv'), dataUrl, name: file.name };
    kvImages.push(kv);
    if (!activeKvId) activeKvId = kv.id;
  }
  renderKvThumbs();
  applyActiveKvToAllCanvases();
  toast('키비주얼 업로드 완료');
}

async function handleLogoFiles(files){
  if (!files || !files.length) return;
  for (const file of files){
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await readFileAsDataURL(file);
    logoImages.push({ id: uid('logo'), dataUrl, name: file.name });
  }
  renderLogoThumbs();
  toast('로고 업로드 완료');
}

async function handleFontFile(file){
  if (!file) return;
  const dataUrl = await readFileAsDataURL(file);
  const family = 'CustomFont_' + uid('f').replace('f_','');
  const fontFace = new FontFace(family, `url(${dataUrl})`);
  try{
    const loaded = await fontFace.load();
    document.fonts.add(loaded);
    customFonts.push({ id: uid('font'), family, name: file.name.replace(/\.(ttf|otf|woff2?|TTF|OTF)$/,'') });
    renderFontList();
    renderFontSelectOptions();
    toast('폰트 추가 완료: ' + file.name);
  }catch(err){
    toast('폰트 로드 실패. ttf/otf/woff 파일을 확인해주세요.');
    console.error(err);
  }
}

// ================= 캔버스 탭 =================
function renderCanvasTabs(){
  const el = document.getElementById('canvas-tabs');
  const list = presets.filter(p=>selectedPresetIds.has(p.id));
  if (!list.length){
    el.innerHTML = '';
    if (!activePresetId) renderEmptyCenter();
    return;
  }
  if (!activePresetId || !selectedPresetIds.has(activePresetId)){
    activePresetId = list[0].id;
  }
  el.innerHTML = list.map(p => `
    <div class="canvas-tab ${p.id===activePresetId?'active':''}" data-id="${p.id}">${p.name}</div>
  `).join('');
  el.querySelectorAll('.canvas-tab').forEach(t=>{
    t.addEventListener('click', ()=>switchActivePreset(t.dataset.id));
  });
  renderAllCanvasStages();
}

function switchActivePreset(id){
  activePresetId = id;
  if (!selectedPresetIds.has(id)) selectedPresetIds.add(id);
  renderPresetList();
  renderCanvasTabs();
  renderRightPanel();
}

function renderEmptyCenter(){
  document.getElementById('stage-wrap').innerHTML = `
    <div class="empty-state" style="height:60vh;">
      <div class="big">🎨</div>
      <div class="t1">작업할 매체를 선택해주세요</div>
      <div class="t2">좌측에서 키비주얼을 업로드하고 프리셋을 체크하면<br>여기에 캔버스가 표시됩니다</div>
    </div>`;
}

// ================= 캔버스 스테이지 (모든 선택된 프리셋을 DOM에 생성) =================
function renderAllCanvasStages(){
  const wrap = document.getElementById('stage-wrap');
  const list = presets.filter(p=>selectedPresetIds.has(p.id));
  if (!list.length){ renderEmptyCenter(); return; }

  // 이미 만들어진 캔버스 페이지는 절대 innerHTML로 재생성하지 않는다.
  // (fabric.Canvas 인스턴스가 살아있는 DOM을 계속 참조해야 하므로, 통째로 다시 그리면
  //  기존 인스턴스가 이미 사라진 <canvas> 엘리먼트를 가리키게 되어 화면이 멈춰버린다.)
  const existingIds = new Set(Array.from(wrap.querySelectorAll('.canvas-page')).map(el=>el.dataset.preset));

  // 더 이상 선택되지 않은 프리셋의 페이지는 제거
  existingIds.forEach(id=>{
    if (!list.find(p=>p.id===id)){
      const el = wrap.querySelector(`.canvas-page[data-preset="${id}"]`);
      if (el) el.remove();
      if (canvases[id]){
        canvases[id].fc.dispose();
        delete canvases[id];
      }
    }
  });

  // 새로 추가된 프리셋만 DOM에 append
  list.forEach(p=>{
    if (existingIds.has(p.id)) return;
    const disp = getDisplayDims(p);
    const pageEl = document.createElement('div');
    pageEl.className = 'canvas-page';
    pageEl.dataset.preset = p.id;
    pageEl.style.display = 'none';
    pageEl.style.flexDirection = 'column';
    pageEl.style.alignItems = 'center';
    pageEl.style.gap = '10px';
    pageEl.innerHTML = `
      <div class="canvas-label">${p.name} · ${p.w}×${p.h}mm</div>
      <div class="canvas-shadow" style="width:${disp.w}px; height:${disp.h}px;">
        <canvas id="fc-${p.id}" width="${disp.w}" height="${disp.h}"></canvas>
      </div>
    `;
    wrap.appendChild(pageEl);
    initFabricCanvas(p);
  });

  // 표시 상태 갱신: activePresetId만 보이게
  wrap.querySelectorAll('.canvas-page').forEach(el=>{
    el.style.display = (el.dataset.preset === activePresetId) ? 'flex' : 'none';
  });

  renderRightPanel();
}

function initFabricCanvas(preset){
  const disp = getDisplayDims(preset);
  const fc = new fabric.Canvas(`fc-${preset.id}`, {
    width: disp.w,
    height: disp.h,
    backgroundColor: '#ffffff',
    preserveObjectStacking: true,
  });
  canvases[preset.id] = {
    fc,
    disp,
    preset,
    kvObj: null,
    logoObjs: [],
    textObjs: {}, // title/date/place/sub -> fabric.Textbox
    barObj: null,
  };
  applyLayoutTemplate(preset.id);
  // 활성 키비주얼이 있으면 즉시 배치
  if (activeKvId) setKvOnCanvas(preset.id, activeKvId);

  fc.on('selection:created', ()=>renderRightPanel());
  fc.on('selection:updated', ()=>renderRightPanel());
  fc.on('selection:cleared', ()=>renderRightPanel());
  fc.on('object:modified', ()=>renderRightPanel());
}

// 레이아웃 템플릿: preset.layout 값에 따라 하단바/측면바/상단타이틀/없음
function applyLayoutTemplate(presetId){
  const c = canvases[presetId];
  if (!c) return;
  const { fc, disp, preset } = c;
  const layout = preset.layout || 'bottom-bar';

  // 기존 바/텍스트 제거 후 재생성
  if (c.barObj) { fc.remove(c.barObj); c.barObj = null; }
  Object.values(c.textObjs).forEach(t=>fc.remove(t));
  c.textObjs = {};

  if (layout === 'none'){
    fc.requestRenderAll();
    return;
  }

  const fontFamily = getCurrentFontFamily();

  if (layout === 'bottom-bar'){
    const barH = disp.h * 0.22;
    const bar = new fabric.Rect({
      left:0, top: disp.h - barH, width: disp.w, height: barH,
      fill: 'rgba(10,10,12,0.62)',
      selectable:false, evented:false, excludeFromExport:false,
    });
    fc.add(bar);
    c.barObj = bar;

    const title = new fabric.Textbox(eventText.title || '행사명을 입력하세요', {
      left: disp.w*0.06, top: disp.h - barH + barH*0.16,
      width: disp.w*0.88,
      fontSize: Math.max(14, disp.h*0.045),
      fontWeight:'700', fill:'#ffffff', fontFamily,
      textAlign:'left',
    });
    const sub = new fabric.Textbox(buildSubLine(), {
      left: disp.w*0.06, top: disp.h - barH + barH*0.56,
      width: disp.w*0.88,
      fontSize: Math.max(10, disp.h*0.024),
      fontWeight:'500', fill:'#e8e6e1', fontFamily,
      textAlign:'left',
    });
    fc.add(title); fc.add(sub);
    c.textObjs.title = title;
    c.textObjs.sub = sub;
    bringBarTextsToFront(c);
  }

  if (layout === 'side-bar'){
    const barW = disp.w * 0.30;
    const bar = new fabric.Rect({
      left: disp.w - barW, top:0, width: barW, height: disp.h,
      fill: 'rgba(10,10,12,0.62)',
      selectable:false, evented:false,
    });
    fc.add(bar);
    c.barObj = bar;

    const title = new fabric.Textbox(eventText.title || '행사명을 입력하세요', {
      left: disp.w - barW + barW*0.1, top: disp.h*0.30,
      width: barW*0.8,
      fontSize: Math.max(14, disp.h*0.06),
      fontWeight:'700', fill:'#ffffff', fontFamily,
      textAlign:'left',
    });
    const sub = new fabric.Textbox(buildSubLine('\n'), {
      left: disp.w - barW + barW*0.1, top: disp.h*0.55,
      width: barW*0.8,
      fontSize: Math.max(10, disp.h*0.03),
      fontWeight:'500', fill:'#e8e6e1', fontFamily,
      textAlign:'left',
    });
    fc.add(title); fc.add(sub);
    c.textObjs.title = title;
    c.textObjs.sub = sub;
    bringBarTextsToFront(c);
  }

  if (layout === 'top-title'){
    const title = new fabric.Textbox(eventText.title || '행사명을 입력하세요', {
      left: disp.w*0.06, top: disp.h*0.05,
      width: disp.w*0.88,
      fontSize: Math.max(14, disp.h*0.05),
      fontWeight:'800', fill:'#ffffff', fontFamily,
      textAlign:'center',
      stroke:'rgba(0,0,0,0.35)', strokeWidth:1,
    });
    const sub = new fabric.Textbox(buildSubLine(), {
      left: disp.w*0.06, top: disp.h*0.05 + Math.max(14, disp.h*0.05) + 8,
      width: disp.w*0.88,
      fontSize: Math.max(10, disp.h*0.026),
      fontWeight:'600', fill:'#ffffff', fontFamily,
      textAlign:'center',
    });
    fc.add(title); fc.add(sub);
    c.textObjs.title = title;
    c.textObjs.sub = sub;
  }

  fc.requestRenderAll();
}

function bringBarTextsToFront(c){
  Object.values(c.textObjs).forEach(t=>c.fc.bringToFront(t));
}

function buildSubLine(sep=' · '){
  return [eventText.date, eventText.place].filter(Boolean).join(sep) || '일시 · 장소';
}

function getCurrentFontFamily(){
  return 'Pretendard';
}

// ================= 키비주얼을 캔버스에 배치 =================
function setKvOnCanvas(presetId, kvId){
  const c = canvases[presetId];
  const kv = kvImages.find(k=>k.id===kvId);
  if (!c || !kv) return;
  const { fc, disp } = c;

  fabric.Image.fromURL(kv.dataUrl, (img)=>{
    if (c.kvObj) fc.remove(c.kvObj);
    // 기본: cover(채우기) - 캔버스를 꽉 채우도록 스케일, 중앙 크롭
    const scale = Math.max(disp.w / img.width, disp.h / img.height);
    img.set({
      left: disp.w/2,
      top: disp.h/2,
      originX:'center', originY:'center',
      scaleX: scale, scaleY: scale,
      selectable:true,
      cornerColor: '#ff5a36',
      cornerStyle:'circle',
      transparentCorners:false,
      borderColor:'#ff5a36',
    });
    fc.add(img);
    fc.sendToBack(img);
    c.kvObj = img;
    c._kvFitMode = 'cover';
    c._kvId = kvId;
    fc.requestRenderAll();
  }, { crossOrigin:'anonymous' });
}

function applyActiveKvToAllCanvases(){
  Object.keys(canvases).forEach(pid=>{
    if (activeKvId) setKvOnCanvas(pid, activeKvId);
    else if (canvases[pid].kvObj){
      canvases[pid].fc.remove(canvases[pid].kvObj);
      canvases[pid].kvObj = null;
      canvases[pid].fc.requestRenderAll();
    }
  });
}

function setKvFitMode(presetId, mode){
  const c = canvases[presetId];
  if (!c || !c.kvObj) return;
  const img = c.kvObj;
  const { disp } = c;
  let scale;
  if (mode === 'cover') scale = Math.max(disp.w / img.width, disp.h / img.height);
  else if (mode === 'contain') scale = Math.min(disp.w / img.width, disp.h / img.height);
  else return;
  img.set({ left: disp.w/2, top: disp.h/2, originX:'center', originY:'center', scaleX:scale, scaleY:scale });
  c._kvFitMode = mode;
  c.fc.requestRenderAll();
  renderRightPanel();
}

// ================= 로고 추가 =================
function addLogoToActiveCanvas(logoId){
  const c = canvases[activePresetId];
  const lg = logoImages.find(l=>l.id===logoId);
  if (!c || !lg) return;
  fabric.Image.fromURL(lg.dataUrl, (img)=>{
    const maxW = c.disp.w * 0.22;
    const scale = maxW / img.width;
    img.set({
      left: c.disp.w*0.06, top: c.disp.h*0.05,
      scaleX:scale, scaleY:scale,
      cornerColor:'#ff5a36', cornerStyle:'circle', transparentCorners:false, borderColor:'#ff5a36',
    });
    img._isLogo = true;
    img._logoId = logoId;
    c.fc.add(img);
    c.logoObjs.push(img);
    c.fc.setActiveObject(img);
    c.fc.requestRenderAll();
    renderRightPanel();
  }, { crossOrigin:'anonymous' });
}

function saveNewPreset(){
  const name = document.getElementById('np-name').value.trim();
  const w = parseFloat(document.getElementById('np-w').value);
  const h = parseFloat(document.getElementById('np-h').value);
  const layout = document.getElementById('np-layout').value;
  if (!name || !w || !h){
    toast('이름과 가로/세로 값을 입력해주세요');
    return;
  }
  const preset = { id: uid('p'), name, w, h, layout, builtin:false };
  presets.push(preset);
  selectedPresetIds.add(preset.id);
  document.getElementById('np-name').value='';
  document.getElementById('np-w').value='';
  document.getElementById('np-h').value='';
  document.getElementById('add-preset-form').classList.remove('show');
  renderPresetList();
  renderCanvasTabs();
  switchActivePreset(preset.id);
  toast(`"${name}" 프리셋이 추가되었습니다`);
}

// ================= 우측 패널 (행사 텍스트 동기화 + 레이어 + 속성) =================
function renderRightPanel(){
  const el = document.getElementById('right-panel');
  const c = canvases[activePresetId];

  let layersHtml = '<div class="hint">캔버스를 선택하면 레이어가 표시됩니다</div>';
  let propsHtml = '';

  if (c){
    const objs = c.fc.getObjects();
    const active = c.fc.getActiveObject();
    layersHtml = objs.slice().reverse().map(o=>{
      let label = '레이어';
      let icon = '◻';
      if (o === c.kvObj){ label = '키비주얼'; icon='🖼'; }
      else if (o === c.barObj){ label = '정보 바'; icon='▭'; }
      else if (o === c.textObjs.title){ label = '행사명 텍스트'; icon='T'; }
      else if (o === c.textObjs.sub){ label = '일시/장소 텍스트'; icon='T'; }
      else if (o._isLogo){ label = '로고'; icon='🏷'; }
      else if (o.type==='textbox'){ label = '텍스트'; icon='T'; }
      const isActive = active === o;
      return `<div class="layer-row ${isActive?'active':''}" data-objid="${objs.indexOf(o)}">
        <span class="icn">${icon}</span><span class="lbl">${label}</span>
        ${o===c.kvObj ? '' : `<span class="del" data-del-layer="${objs.indexOf(o)}">✕</span>`}
      </div>`;
    }).join('');

    propsHtml = buildPropsPanel(c, active);
  }

  el.innerHTML = `
    <div class="section-title">행사 정보 (전체 매체 동기화)</div>
    <div class="field-group">
      <label>행사명</label>
      <input type="text" id="ev-title" value="${escapeAttr(eventText.title)}" placeholder="예: 2026 하트하트 그림 공모전 시상식">
    </div>
    <div class="field-group">
      <label>일시</label>
      <input type="text" id="ev-date" value="${escapeAttr(eventText.date)}" placeholder="예: 2026.7.15(수) 14:00">
    </div>
    <div class="field-group">
      <label>장소</label>
      <input type="text" id="ev-place" value="${escapeAttr(eventText.place)}" placeholder="예: 서울 강남구 코엑스 3층">
    </div>
    <button class="btn btn-accent btn-block btn-sm" id="btn-sync-text">모든 매체에 적용</button>
    <div class="hint">입력 후 "모든 매체에 적용"을 누르면 모든 캔버스의 텍스트가 갱신됩니다. 적용 후에도 각 매체에서 위치/크기는 개별 조정 가능합니다.</div>

    <div class="divider"></div>

    <div class="section-title">현재 매체: ${c ? c.preset.name : '-'}</div>
    ${c ? `
    <div class="field-group">
      <label>키비주얼 맞춤 방식</label>
      <div class="fit-row">
        <button data-fit="cover" class="${c._kvFitMode==='cover'?'active':''}">채우기(Cover)</button>
        <button data-fit="contain" class="${c._kvFitMode==='contain'?'active':''}">맞추기(Contain)</button>
      </div>
    </div>
    <div class="field-group">
      <label>레이아웃 스타일</label>
      <select id="layout-style">
        <option value="bottom-bar" ${c.preset.layout==='bottom-bar'?'selected':''}>하단 정보 바</option>
        <option value="side-bar" ${c.preset.layout==='side-bar'?'selected':''}>측면 정보 바</option>
        <option value="top-title" ${c.preset.layout==='top-title'?'selected':''}>상단 타이틀</option>
        <option value="none" ${c.preset.layout==='none'?'selected':''}>텍스트 없음</option>
      </select>
    </div>
    ` : ''}

    <div class="divider"></div>

    <div class="section-title">레이어</div>
    <div id="layer-list">${layersHtml}</div>

    <div class="divider"></div>

    <div class="section-title">속성</div>
    <div id="props-panel">${propsHtml}</div>

    <div class="divider"></div>
    <button class="btn btn-ghost btn-block btn-sm" id="btn-export-current">현재 매체만 다운로드</button>
  `;

  bindRightPanelEvents(c);
}

function escapeAttr(s){
  return (s||'').replace(/"/g,'&quot;');
}

function buildPropsPanel(c, active){
  if (!active) return '<div class="hint">레이어를 클릭해서 선택하면 속성을 편집할 수 있습니다</div>';

  if (active.type === 'textbox'){
    const fontOptions = ['Pretendard', ...customFonts.map(f=>f.family)]
      .map(f=>`<option value="${f}" ${active.fontFamily===f?'selected':''}>${f==='Pretendard'?'Pretendard':customFonts.find(cf=>cf.family===f)?.name||f}</option>`)
      .join('');
    return `
      <div class="field-group">
        <label>텍스트 내용</label>
        <textarea id="prop-text">${active.text}</textarea>
      </div>
      <div class="field-row-2">
        <div class="field-group">
          <label>글꼴</label>
          <select id="prop-font">${fontOptions}</select>
        </div>
        <div class="field-group">
          <label>크기</label>
          <input type="number" id="prop-size" value="${Math.round(active.fontSize)}" min="6">
        </div>
      </div>
      <div class="field-group">
        <label>색상</label>
        <div class="color-swatch-row">
          <input type="color" id="prop-color" value="${rgbToHex(active.fill)}">
        </div>
      </div>
      <div class="field-group">
        <label>정렬</label>
        <div class="align-row">
          <button data-align="left" class="${active.textAlign==='left'?'active':''}">왼쪽</button>
          <button data-align="center" class="${active.textAlign==='center'?'active':''}">중앙</button>
          <button data-align="right" class="${active.textAlign==='right'?'active':''}">오른쪽</button>
        </div>
      </div>
      <div class="field-group">
        <label>굵기</label>
        <div class="align-row">
          <button data-weight="400" class="${active.fontWeight=='400'?'active':''}">보통</button>
          <button data-weight="600" class="${active.fontWeight=='600'?'active':''}">중간</button>
          <button data-weight="800" class="${active.fontWeight=='800'?'active':''}">굵게</button>
        </div>
      </div>
    `;
  }

  if (active.type === 'image'){
    const isLogo = !!active._isLogo;
    return `
      <div class="hint">${isLogo ? '로고 이미지입니다. 드래그/리사이즈로 위치와 크기를 조정하세요.' : '키비주얼 이미지입니다. 드래그로 위치를 조정할 수 있습니다.'}</div>
      <div class="mini-btn-row" style="margin-top:10px;">
        <button class="btn btn-ghost btn-sm" id="btn-bring-front">맨 앞으로</button>
        <button class="btn btn-ghost btn-sm" id="btn-send-back">맨 뒤로</button>
      </div>
    `;
  }

  if (active.type === 'rect'){
    return `
      <div class="field-group">
        <label>바(Bar) 색상</label>
        <div class="color-swatch-row">
          <input type="color" id="prop-bar-color" value="${rgbToHex(active.fill)}">
          <input type="range" id="prop-bar-opacity" min="0" max="100" value="${Math.round((active.opacity??1)*100)}">
        </div>
      </div>
    `;
  }

  return '<div class="hint">이 레이어는 편집 가능한 속성이 없습니다</div>';
}

function rgbToHex(fill){
  if (!fill) return '#ffffff';
  if (fill.startsWith('#')) return fill;
  const m = fill.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if (!m) return '#ffffff';
  return '#' + [1,2,3].map(i=>parseInt(m[i]).toString(16).padStart(2,'0')).join('');
}

function bindRightPanelEvents(c){
  // 행사 텍스트 입력 (입력 즉시 내부 상태만 갱신, 버튼으로 전체 적용)
  const tEl = document.getElementById('ev-title');
  const dEl = document.getElementById('ev-date');
  const pEl = document.getElementById('ev-place');
  if (tEl){
    tEl.addEventListener('input', ()=>{ eventText.title = tEl.value; });
    dEl.addEventListener('input', ()=>{ eventText.date = dEl.value; });
    pEl.addEventListener('input', ()=>{ eventText.place = pEl.value; });
  }
  const syncBtn = document.getElementById('btn-sync-text');
  if (syncBtn) syncBtn.addEventListener('click', syncTextToAllCanvases);

  if (!c) return;

  document.querySelectorAll('[data-fit]').forEach(b=>{
    b.addEventListener('click', ()=>setKvFitMode(activePresetId, b.dataset.fit));
  });

  const layoutSel = document.getElementById('layout-style');
  if (layoutSel){
    layoutSel.addEventListener('change', ()=>{
      c.preset.layout = layoutSel.value;
      applyLayoutTemplate(activePresetId);
      renderRightPanel();
    });
  }

  document.querySelectorAll('[data-objid]').forEach(row=>{
    row.addEventListener('click', (e)=>{
      if (e.target.dataset.delLayer) return;
      const obj = c.fc.getObjects()[parseInt(row.dataset.objid)];
      c.fc.setActiveObject(obj);
      c.fc.requestRenderAll();
      renderRightPanel();
    });
  });
  document.querySelectorAll('[data-del-layer]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const obj = c.fc.getObjects()[parseInt(b.dataset.delLayer)];
      if (obj === c.textObjs.title) c.textObjs.title = null;
      if (obj === c.textObjs.sub) c.textObjs.sub = null;
      if (obj === c.barObj) c.barObj = null;
      if (obj._isLogo) c.logoObjs = c.logoObjs.filter(o=>o!==obj);
      c.fc.remove(obj);
      c.fc.requestRenderAll();
      renderRightPanel();
    });
  });

  const active = c.fc.getActiveObject();
  if (active && active.type==='textbox'){
    const propText = document.getElementById('prop-text');
    const propFont = document.getElementById('prop-font');
    const propSize = document.getElementById('prop-size');
    const propColor = document.getElementById('prop-color');
    propText.addEventListener('input', ()=>{ active.set('text', propText.value); c.fc.requestRenderAll(); });
    propFont.addEventListener('change', ()=>{ active.set('fontFamily', propFont.value); c.fc.requestRenderAll(); });
    propSize.addEventListener('input', ()=>{ active.set('fontSize', parseFloat(propSize.value)||16); c.fc.requestRenderAll(); });
    propColor.addEventListener('input', ()=>{ active.set('fill', propColor.value); c.fc.requestRenderAll(); });
    document.querySelectorAll('[data-align]').forEach(b=>{
      b.addEventListener('click', ()=>{ active.set('textAlign', b.dataset.align); c.fc.requestRenderAll(); renderRightPanel(); });
    });
    document.querySelectorAll('[data-weight]').forEach(b=>{
      b.addEventListener('click', ()=>{ active.set('fontWeight', b.dataset.weight); c.fc.requestRenderAll(); renderRightPanel(); });
    });
  }

  if (active && active.type==='image'){
    const bf = document.getElementById('btn-bring-front');
    const sb = document.getElementById('btn-send-back');
    if (bf) bf.addEventListener('click', ()=>{ c.fc.bringToFront(active); c.fc.requestRenderAll(); });
    if (sb) sb.addEventListener('click', ()=>{ c.fc.sendToBack(active); c.fc.requestRenderAll(); });
  }

  if (active && active.type==='rect'){
    const bc = document.getElementById('prop-bar-color');
    const bo = document.getElementById('prop-bar-opacity');
    bc.addEventListener('input', ()=>{
      const hex = bc.value;
      const op = (bo.value/100);
      active.set('fill', hexToRgba(hex, op));
      c.fc.requestRenderAll();
    });
    bo.addEventListener('input', ()=>{
      const hex = bc.value;
      const op = (bo.value/100);
      active.set('fill', hexToRgba(hex, op));
      c.fc.requestRenderAll();
    });
  }

  const exportCurBtn = document.getElementById('btn-export-current');
  if (exportCurBtn) exportCurBtn.addEventListener('click', ()=>exportSinglePreset(activePresetId));
}

function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderFontSelectOptions(){
  // 우측 패널이 열려있을 때 폰트 목록 갱신을 위해 재렌더
  renderRightPanel();
}

function syncTextToAllCanvases(){
  Object.keys(canvases).forEach(pid=>{
    const c = canvases[pid];
    if (c.textObjs.title) c.textObjs.title.set('text', eventText.title || '행사명을 입력하세요');
    if (c.textObjs.sub){
      const sep = c.preset.layout === 'side-bar' ? '\n' : ' · ';
      c.textObjs.sub.set('text', buildSubLine(sep));
    }
    c.fc.requestRenderAll();
  });
  toast('모든 매체에 텍스트를 적용했습니다');
}

// ================= 내보내기 (고해상도 PNG) =================
// fabric 캔버스를 화면 표시 스케일이 아닌, 실제 인쇄용 px(exportDpi 기준)로 렌더링해서 dataURL 추출
function exportCanvasToDataURL(presetId){
  const c = canvases[presetId];
  if (!c) return null;
  const exp = getExportDims(c.preset);
  const multiplier = exp.w / c.disp.w; // 화면 캔버스 대비 배율
  return c.fc.toDataURL({ format:'png', multiplier });
}

function dataURLToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(',');
  const mime = meta.match(/data:(.*?);/)[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

function exportSinglePreset(presetId){
  const c = canvases[presetId];
  if (!c){ toast('내보낼 캔버스가 없습니다'); return; }
  if (!c.kvObj){ toast('키비주얼을 먼저 업로드해주세요'); return; }
  c.fc.discardActiveObject();
  c.fc.requestRenderAll();
  const dataUrl = exportCanvasToDataURL(presetId);
  const blob = dataURLToBlob(dataUrl);
  const safeName = c.preset.name.replace(/[^\w가-힣]+/g,'_');
  downloadBlob(blob, `${safeName}_${c.preset.w}x${c.preset.h}mm.png`);
  toast(`${c.preset.name} 다운로드 완료`);
}

async function exportAllSelected(){
  const list = presets.filter(p=>selectedPresetIds.has(p.id));
  const validList = list.filter(p=>canvases[p.id] && canvases[p.id].kvObj);
  if (!validList.length){
    toast('키비주얼이 배치된 매체가 없습니다. 먼저 키비주얼을 업로드해주세요.');
    return;
  }

  const btn = document.getElementById('btn-export-all');
  const origText = btn.textContent;
  btn.disabled = true;

  if (validList.length === 1){
    btn.textContent = '내보내는 중...';
    exportSinglePreset(validList[0].id);
    btn.disabled = false;
    btn.textContent = origText;
    return;
  }

  btn.textContent = `ZIP 생성 중... (0/${validList.length})`;
  const zip = new JSZip();
  for (let i=0;i<validList.length;i++){
    const p = validList[i];
    const c = canvases[p.id];
    c.fc.discardActiveObject();
    c.fc.requestRenderAll();
    await new Promise(r=>setTimeout(r, 30)); // 렌더 안정화 대기
    const dataUrl = exportCanvasToDataURL(p.id);
    const base64 = dataUrl.split(',')[1];
    const safeName = p.name.replace(/[^\w가-힣]+/g,'_');
    zip.file(`${safeName}_${p.w}x${p.h}mm.png`, base64, { base64:true });
    btn.textContent = `ZIP 생성 중... (${i+1}/${validList.length})`;
  }
  const content = await zip.generateAsync({ type:'blob' });
  downloadBlob(content, 'planbag_kv_variations.zip');
  btn.disabled = false;
  btn.textContent = origText;
  toast(`${validList.length}개 매체 ZIP 다운로드 완료`);
}

// ================= 전체 초기화 =================
function resetAll(){
  if (!confirm('모든 작업 내용을 초기화하시겠습니까? 업로드한 이미지와 텍스트가 모두 사라집니다.')) return;
  kvImages = []; activeKvId = null;
  logoImages = [];
  customFonts = [];
  eventText = { title:'', date:'', place:'', sub:'' };
  Object.values(canvases).forEach(c=>c.fc.dispose());
  canvases = {};
  presets = [
    { id:'p_xbanner', name:'X배너', w:600, h:1800, layout:'bottom-bar', builtin:true },
    { id:'p_poster',  name:'포스터 (A1)', w:594, h:841, layout:'bottom-bar', builtin:true },
    { id:'p_banner',  name:'현수막 (가로)', w:3000, h:800, layout:'side-bar', builtin:true },
  ];
  selectedPresetIds = new Set(presets.map(p=>p.id));
  activePresetId = null;
  renderLeftPanel();
  renderCanvasTabs();
  toast('초기화되었습니다');
}

// ================= 앱 초기화 =================
function initApp(){
  renderLeftPanel();
  renderCanvasTabs();
  renderRightPanel();

  document.getElementById('btn-export-all').addEventListener('click', exportAllSelected);
  document.getElementById('btn-reset').addEventListener('click', resetAll);
}

window.addEventListener('DOMContentLoaded', initApp);
// 폰트(Pretendard) 로딩 후 한 번 더 리렌더 (초기 레이아웃에서 폰트 적용 보정)
if (document.fonts && document.fonts.ready){
  document.fonts.ready.then(()=>{
    Object.keys(canvases).forEach(pid=>canvases[pid].fc.requestRenderAll());
  });
}
</script>
